name: Validate canonical dataset

on:
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check generated datasets and invariants
        run: |
          node scripts/build-datasets.mjs --check
          node scripts/validate-dataset.mjs
          node scripts/validate-citation-format.mjs
          node scripts/validate-pinn-realm.mjs
