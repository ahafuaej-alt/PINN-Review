name: Apply legacy citation validation bridge

on:
  issues:
    types: [opened]

permissions: {}

concurrency:
  group: citation-validation-maintenance
  cancel-in-progress: false

jobs:
  apply-fix:
    if: github.event.issue.user.login == github.repository_owner && github.event.issue.title == '[Apply legacy citation validation bridge]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Align canonical validation with the citation migration
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/lib/dataset-core.mjs')
          text = path.read_text(encoding='utf-8')
          old = "    if (paper.provenance?.citation_mode === 'automatic') add(paper.citation === formatMdpiCitation(paper), `${label} automatic MDPI citation is stale`);"
          new = """    if (paper.provenance?.citation_mode === 'automatic') {
              const fullVenueCitation = formatMdpiCitation(paper);
              if (paper.citation !== fullVenueCitation) {
                // Existing automatic records may retain the former abbreviated
                // journal output until that paper is regenerated. New automatic
                // citations always use the canonical full venue.name value.
                const legacyPaper = structuredClone(paper);
                if (legacyPaper.bibliographic?.journal_abbreviation) {
                  legacyPaper.venue = { ...legacyPaper.venue, name: legacyPaper.bibliographic.journal_abbreviation };
                }
                add(paper.citation === formatMdpiCitation(legacyPaper), `${label} automatic MDPI citation is stale`);
              }
            }"""
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one validateMaster citation check, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Run complete repository verification
        id: verify
        continue-on-error: true
        run: |
          node scripts/build-datasets.mjs --check
          node scripts/validate-dataset.mjs
          node scripts/validate-citation-format.mjs
          node scripts/validate-pinn-realm.mjs
          node --check scripts/lib/dataset-core.mjs
          git diff --check
      - name: Report failed verification
        if: steps.verify.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ❌ Citation validation bridge stopped\n\nThe complete repository verification failed. Nothing was committed.\n\n- Workflow run: ${runUrl}`
            });
      - name: Stop after failed verification
        if: steps.verify.outcome != 'success'
        run: exit 1
      - name: Remove one-time maintenance workflow
        run: rm .github/workflows/apply-legacy-citation-validation-bridge.yml
      - name: Commit validated bridge
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/lib/dataset-core.mjs .github/workflows/apply-legacy-citation-validation-bridge.yml
          git commit -m "Allow legacy abbreviated automatic citations during migration [skip pages]"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Report success
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        with:
          script: |
            const sha = process.env.COMMIT_SHA;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ✅ Canonical citation validation aligned\n\nThe full repository verification passed. New automatic citations use full publication names, while existing abbreviated automatic citations remain valid until regenerated.\n\n- Commit: https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${sha}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
