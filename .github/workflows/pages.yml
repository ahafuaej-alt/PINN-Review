name: Deploy GitHub Pages

run-name: Deploy GitHub Pages${{ inputs.source_sha && format(' · {0}', inputs.source_sha) || '' }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_sha:
        description: 'Exact repository commit to deploy (defaults to the triggering commit)'
        required: false
        type: string
  workflow_call:
    inputs:
      source_sha:
        description: 'Exact repository commit to deploy'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: inputs.source_sha != '' || github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip pages]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify canonical and generated datasets
        run: |
          node scripts/build-datasets.mjs --check
          node scripts/validate-dataset.mjs
          node scripts/validate-citation-format.mjs
          node scripts/validate-pinn-realm.mjs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
