name: Review dataset update request

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  group: ${{ github.event_name == 'issue_comment' && github.event.comment.body == '/apply-dataset-update' && 'canonical-dataset-update' || format('dataset-update-{0}', github.event.issue.number) }}
  cancel-in-progress: false

jobs:
  validate-request:
    if: github.event_name == 'issues' && startsWith(github.event.issue.title, '[Dataset update]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract submitted update
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node -e "require('fs').writeFileSync('/tmp/pinn-update-issue.txt', process.env.ISSUE_BODY || '')"
          node scripts/extract-dataset-update.mjs /tmp/pinn-update-issue.txt /tmp/pinn-paper-update.json
      - name: Validate and preview the coordinated change
        id: validate
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/apply-paper-update.mjs /tmp/pinn-paper-update.json --dry-run > /tmp/pinn-validation.json 2> /tmp/pinn-validation-error.txt
      - name: Report validation result
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATION_OUTCOME: ${{ steps.validate.outcome }}
        with:
          script: |
            const fs = require('fs');
            const passed = process.env.VALIDATION_OUTCOME === 'success';
            let body;
            if (passed) {
              const result = JSON.parse(fs.readFileSync('/tmp/pinn-validation.json', 'utf8'));
              const fields = result.audit.changed_fields.join(', ');
              body = `### ✅ Dataset validation passed\n\nPaper **[${result.audit.paper_id}]** can be applied as dataset version **${result.version}**. Affected fields: ${fields}.\n\nA repository maintainer should review the evidence and citation preview, then comment exactly:\n\n\`/apply-dataset-update\`\n\nThis applies and commits the update, but does not deploy the Atlas. The issue will be closed with the label \`dataset-awaiting-deployment\`. Deploy all accumulated updates later from **Actions → Deploy pending dataset updates → Run workflow**.`;
            } else {
              const error = fs.existsSync('/tmp/pinn-validation-error.txt') ? fs.readFileSync('/tmp/pinn-validation-error.txt', 'utf8').trim() : 'The update package could not be validated.';
              body = `### ❌ Dataset validation failed\n\n\`\`\`text\n${error.slice(0, 5000)}\n\`\`\`\n\nCorrect the request in Dataset Manager and submit a new update. Nothing was published.`;
            }
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
      - name: Mark invalid workflow run
        if: steps.validate.outcome != 'success'
        run: exit 1

  apply-approved-request:
    if: github.event_name == 'issue_comment' && github.event.comment.body == '/apply-dataset-update' && startsWith(github.event.issue.title, '[Dataset update]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}
      paper_id: ${{ steps.apply.outputs.paper_id }}
      version: ${{ steps.apply.outputs.version }}
    steps:
      - name: Confirm maintainer permission
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.getCollaboratorPermissionLevel({ owner: context.repo.owner, repo: context.repo.repo, username: context.actor });
            if (!['admin', 'maintain', 'write'].includes(response.data.permission)) core.setFailed('Only a repository maintainer can approve a dataset update.');
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract approved update
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node -e "require('fs').writeFileSync('/tmp/pinn-update-issue.txt', process.env.ISSUE_BODY || '')"
          node scripts/extract-dataset-update.mjs /tmp/pinn-update-issue.txt /tmp/pinn-paper-update.json
      - name: Apply, regenerate, and validate every related dataset
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/apply-paper-update.mjs /tmp/pinn-paper-update.json | tee /tmp/pinn-apply-result.json
          node scripts/build-datasets.mjs --check
          node scripts/validate-dataset.mjs
          node scripts/validate-citation-format.mjs
          node scripts/validate-pinn-realm.mjs
          git diff --check
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('/tmp/pinn-apply-result.json', 'utf8'));
          console.log(`paper_id=${result.audit.paper_id}`);
          console.log(`version=${result.version}`);
          NODE
        shell: bash
      - name: Commit coordinated dataset update
        id: commit
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers-master.json data/changes.json data/references.json data/references-metadata.json data/pinn-realm.json
          git commit -m "Update canonical paper dataset [skip pages]"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Mark failed coordinated update
        if: steps.apply.outcome != 'success' || steps.commit.outcome != 'success'
        run: exit 1

  report-applied-request:
    name: Report committed update
    needs: apply-approved-request
    if: ${{ always() && github.event_name == 'issue_comment' && github.event.comment.body == '/apply-dataset-update' && startsWith(github.event.issue.title, '[Dataset update]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Report application result
        uses: actions/github-script@v7
        env:
          APPLY_JOB_RESULT: ${{ needs.apply-approved-request.result }}
          DATASET_COMMIT: ${{ needs.apply-approved-request.outputs.commit_sha }}
          PAPER_ID: ${{ needs.apply-approved-request.outputs.paper_id }}
          DATASET_VERSION: ${{ needs.apply-approved-request.outputs.version }}
        with:
          script: |
            const applied = process.env.APPLY_JOB_RESULT === 'success';
            const commitSha = process.env.DATASET_COMMIT;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body;

            if (applied) {
              const pendingLabel = {
                name: 'dataset-awaiting-deployment',
                color: 'FBCA04',
                description: 'Dataset update is committed but not yet deployed to the live Atlas'
              };

              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: pendingLabel.name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...pendingLabel });
              }

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'dataset-live'
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [pendingLabel.name]
              });

              const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${commitSha}`;
              body = `### ✅ Dataset update committed\n\nPaper **[${process.env.PAPER_ID}]** was applied as dataset version **${process.env.DATASET_VERSION}**. The canonical and generated dataset files were committed successfully, but the live Atlas has **not** been deployed yet.\n\n- Dataset commit: ${commitUrl}\n- Status: \`dataset-awaiting-deployment\`\n\nThis issue is now closed. After reviewing more papers, deploy all accumulated updates once from **Actions → Deploy pending dataset updates → Run workflow**.`;
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            } else {
              body = `### ❌ Dataset application stopped\n\nThe update could not be validated and committed. Nothing was added to the pending deployment batch, and this issue remains open.\n\nOpen the workflow run for the exact diagnostic:\n\n${runUrl}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
