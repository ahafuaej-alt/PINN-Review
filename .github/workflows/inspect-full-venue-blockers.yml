name: Inspect full venue blockers

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  inspect:
    if: github.event.issue.user.login == github.repository_owner && github.event.issue.title == '[Inspect full venue blockers]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Extract blocker records
        run: |
          node - <<'NODE' > /tmp/blockers.json
          const fs = require('fs');
          const master = JSON.parse(fs.readFileSync('data/papers-master.json', 'utf8'));
          const ids = new Set([651, 766, 838]);
          const records = master.papers
            .filter((paper) => ids.has(paper.id))
            .map(({ id, title, citation, doi, publisher_url, venue, year, bibliographic, provenance }) => ({
              id, title, citation, doi, publisher_url, venue, year, bibliographic: bibliographic || null,
              provenance: {
                evidence_url: provenance?.evidence_url || null,
                publisher_enrichment: provenance?.publisher_enrichment || null,
                publisher_enrichment_review: provenance?.publisher_enrichment_review || null,
                citation_mode: provenance?.citation_mode || null
              }
            }));
          console.log(JSON.stringify(records, null, 2));
          NODE
      - name: Report blocker metadata
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const details = fs.readFileSync('/tmp/blockers.json', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Citation blocker metadata\n\n\`\`\`json\n${details}\n\`\`\``
            });
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed', state_reason: 'completed' });
