name: Apply all full venue citations v2

on:
  issues:
    types: [opened]

permissions: {}

concurrency:
  group: all-full-venue-citations-v2
  cancel-in-progress: false

jobs:
  migrate:
    if: github.event.issue.user.login == github.repository_owner && github.event.issue.title == '[Apply all full venue citations v2]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Regenerate every journal-style citation
        id: migrate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/regenerate-full-venue-citations.mjs 2>&1 | tee /tmp/full-venue-result.log
      - name: Report migration failure
        if: steps.migrate.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.existsSync('/tmp/full-venue-result.log')
              ? fs.readFileSync('/tmp/full-venue-result.log', 'utf8').trim()
              : 'The migration command failed without producing a log.';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `### ❌ Full-venue citation migration stopped\n\nNo dataset files were committed. The migration requires every journal, conference-journal, and preprint record to regenerate successfully.\n\n\`\`\`text\n${log.slice(0, 60000)}\n\`\`\`\n\n- Workflow run: ${runUrl}`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
      - name: Stop after migration failure
        if: steps.migrate.outcome != 'success'
        run: exit 1
      - name: Validate the complete repository
        run: |
          node scripts/build-datasets.mjs --check
          node scripts/validate-dataset.mjs
          node scripts/validate-citation-format.mjs
          node scripts/validate-pinn-realm.mjs
          node --check assets/citation-format.mjs
          node --check assets/dataset-manager.js
          node --check scripts/apply-paper-update.mjs
          node --check scripts/regenerate-full-venue-citations.mjs
          node --check scripts/lib/dataset-core.mjs
          git diff --check
      - name: Remove one-time workflow
        run: rm .github/workflows/apply-all-full-venue-citations-v2.yml
      - name: Commit complete migration
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers-master.json data/changes.json data/references.json data/references-metadata.json data/pinn-realm.json scripts/regenerate-full-venue-citations.mjs .github/workflows/apply-all-full-venue-citations-v2.yml
          git commit -m "Apply full venue names to all journal-style citations [skip pages]"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Report migration result
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('/tmp/full-venue-result.log', 'utf8'));
            const body = `### ✅ All journal-style citations regenerated\n\nEvery journal, conference-journal, and preprint record now uses the canonical publication name from \`venue.name\`. No eligible record was skipped.\n\n- Dataset version: **${result.version}**\n- Journal-style records processed: **${result.journal_style_records}**\n- Citations changed: **${result.citation_changes}**\n- Bibliographic records backfilled: **${result.bibliographic_backfills}**\n- Records moved to automatic citation mode: **${result.automatic_mode_changes}**\n- Commit: https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${process.env.COMMIT_SHA}\n- Validation: passed\n- Pages: not deployed yet`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed', state_reason: 'completed' });
