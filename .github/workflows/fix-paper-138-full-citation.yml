name: Fix paper 138 full-name automatic citation

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  fix:
    if: github.event.issue.user.login == github.repository_owner && github.event.issue.title == '[Fix paper 138 full citation]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Correct paper 138 and regenerate datasets
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { formatMdpiCitation } from './assets/citation-format.mjs';
          import { bumpPatchVersion, writeJsonAtomic } from './scripts/lib/dataset-core.mjs';
          import { generateDatasets } from './scripts/build-datasets.mjs';

          const today = new Date().toISOString().slice(0, 10);
          const master = JSON.parse(fs.readFileSync('data/papers-master.json', 'utf8'));
          const changes = JSON.parse(fs.readFileSync('data/changes.json', 'utf8'));
          const paper = master.papers.find((record) => record.id === 138);
          if (!paper) throw new Error('Paper 138 was not found.');
          if (String(paper.doi || '').toLowerCase() !== '10.1109/tmtt.2024.3521389') throw new Error(`Paper 138 DOI mismatch: ${paper.doi}`);

          paper.venue = { ...paper.venue, name: 'IEEE Transactions on Microwave Theory and Techniques', type: 'journal' };
          paper.provenance ||= {};
          paper.provenance.citation_mode = 'automatic';
          const generated = formatMdpiCitation(paper);
          const expected = 'Qi, S.; Sarris, C.D. Physics-Informed Deep Operator Network for 3-D Time-Domain Electromagnetic Modeling. IEEE Transactions on Microwave Theory and Techniques 2025, 73, 3800-3812. https://doi.org/10.1109/TMTT.2024.3521389.';
          if (generated !== expected) throw new Error(`Unexpected generated citation:\n${generated}`);
          paper.citation = generated;
          paper.last_updated = today;

          master.metadata.dataset_version = bumpPatchVersion(master.metadata.dataset_version);
          master.metadata.last_updated = today;
          changes.changes.unshift({
            change_id: `paper-138-full-publication-citation-${today}-${master.metadata.dataset_version}`,
            version: master.metadata.dataset_version,
            date: today,
            paper_id: 138,
            changed_fields: ['citation', 'venue'],
            reason: 'Use the canonical full publication name in the automatic MDPI-formatted citation.',
            evidence: { url: 'https://doi.org/10.1109/TMTT.2024.3521389', note: 'Full IEEE journal title confirmed for the DOI.' },
            submitted_by: 'repository-owner-maintenance',
            impact: { citation_mode: 'automatic', journal_name_source: 'venue.name' }
          });

          writeJsonAtomic('data/papers-master.json', master);
          writeJsonAtomic('data/changes.json', changes);
          generateDatasets();
          fs.writeFileSync('/tmp/paper-138-result.json', JSON.stringify({ version: master.metadata.dataset_version, citation: paper.citation }, null, 2));
          NODE
      - name: Validate complete repository
        run: |
          node scripts/build-datasets.mjs --check
          node scripts/validate-dataset.mjs
          node scripts/validate-citation-format.mjs
          node scripts/validate-pinn-realm.mjs
          git diff --check
      - name: Remove one-time workflow
        run: rm .github/workflows/fix-paper-138-full-citation.yml
      - name: Commit correction
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers-master.json data/changes.json data/references.json data/references-metadata.json data/pinn-realm.json .github/workflows/fix-paper-138-full-citation.yml
          git commit -m "Use full publication name for paper 138 citation [skip pages]"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Report success
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('/tmp/paper-138-result.json', 'utf8'));
            const body = `### ✅ Paper 138 automatic citation corrected\n\nDataset version **${result.version}** now stores:\n\n> ${result.citation}\n\n- Commit: https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${process.env.COMMIT_SHA}\n- Validation: passed\n- Pages: not deployed yet`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed', state_reason: 'completed' });
